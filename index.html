<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#120824" />
    <meta name="description" content="Une scène artistique interactive avec cinq personnages sonores à déplacer." />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>Chromaphonie</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #120824;
        touch-action: none;
        overscroll-behavior: none;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: grab;
      }

      canvas.dragging {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <canvas id="stage" aria-label="Scène interactive avec personnages sonores"></canvas>
    <script type="module" src="app.js"></script>
  </body>
</html>
